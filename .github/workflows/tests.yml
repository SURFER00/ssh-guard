name: Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Set up local SSH server for e2e tests
        run: |
          sudo apt-get install -y openssh-server
          sudo systemctl start ssh
          ssh-keygen -t ed25519 -f /tmp/test_ssh_key -N ""
          mkdir -p ~/.ssh
          cat /tmp/test_ssh_key.pub >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys
          # pre-trust localhost so Paramiko's AutoAddPolicy has a clean host to connect to
          ssh-keyscan -H localhost >> ~/.ssh/known_hosts
          echo "TEST_SSH_HOST=localhost"          >> $GITHUB_ENV
          echo "TEST_SSH_USER=$(whoami)"          >> $GITHUB_ENV
          echo "TEST_SSH_KEY=/tmp/test_ssh_key"   >> $GITHUB_ENV

      - name: Run tests
        run: pytest tests/ -v
